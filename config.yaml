server:
  port: 8080

upstreams:
  - name: api-servers
    strategy: round-robin
    targets:
      - url: http://localhost:3001
        weight: 3
      - url: http://localhost:3002
        weight: 2
      - url: http://localhost:3003
        weight: 1
    health_check:
      path: /health
      interval: 10s
      timeout: 3s
    retries: 2

  - name: web-servers
    strategy: least-connections
    targets:
      - url: http://localhost:4001
      - url: http://localhost:4002
    health_check:
      path: /healthz
      interval: 5s
      timeout: 2s
